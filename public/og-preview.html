<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OG Image Preview — 1200×630</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Grotesk:wght@300;400;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  .card {
    width: 1200px;
    height: 630px;
    background: #0a0a0f;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: stretch;
    border: 1px solid rgba(0,210,255,0.15);
  }

  /* Scanlines */
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  .glow-cyan {
    position: absolute;
    top: -120px; left: -80px;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: rgba(0,210,255,0.10);
    filter: blur(100px);
    pointer-events: none;
  }
  .glow-magenta {
    position: absolute;
    bottom: -80px; left: 200px;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: rgba(224,64,251,0.08);
    filter: blur(100px);
    pointer-events: none;
  }

  /* ─── SINISTRA ─── */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 48px 52px;
    position: relative;
    z-index: 2;
  }
  .top-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.28em;
    color: rgba(0,210,255,0.65);
    text-transform: uppercase;
  }
  .middle {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 16px 0;
  }
  .title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 300;
    font-size: 100px;
    line-height: 0.88;
    letter-spacing: -0.03em;
    color: #f0ebe0;
  }
  .title .accent { color: #e040fb; text-shadow: 0 0 40px rgba(224,64,251,0.6); }
  .title .dot    { color: #00d2ff; text-shadow: 0 0 20px rgba(0,210,255,0.6); }
  .divider {
    width: 320px; height: 1px;
    background: linear-gradient(90deg, rgba(0,210,255,0.4), transparent);
    margin: 28px 0;
  }
  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 26px;
    color: #00d2ff;
    text-shadow: 0 0 30px rgba(0,210,255,0.45);
    line-height: 1.4;
    max-width: 480px;
  }
  .bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .read-or-perish {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(240,235,224,0.22);
  }
  .read-or-perish .or { color: rgba(224,64,251,0.50); }
  .url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    color: rgba(0,210,255,0.45);
  }

  /* ─── DESTRA ─── */
  .right-panel {
    width: 380px;
    flex-shrink: 0;
    border-left: 1px solid rgba(0,210,255,0.10);
    position: relative;
    z-index: 2;
    overflow: hidden;
  }

  /* Hero image — texture atmosferica */
  .rp-hero {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    opacity: 0.38;
    display: block;
  }

  /* Sfumatura sinistra: fonde il pannello col testo */
  .right-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      90deg,
      #0a0a0f 0%,
      rgba(10,10,15,0.55) 35%,
      rgba(10,10,15,0.10) 100%
    );
    z-index: 1;
    pointer-events: none;
  }

  /* ◈ gigante al centro — subliminal brand mark */
  .rp-ghost-icon {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 200px;
    color: rgba(0,210,255,0.045);
    line-height: 1;
    z-index: 2;
    pointer-events: none;
    user-select: none;
  }

  /* Badge in basso */
  .rp-badge {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 40px;
    gap: 5px;
  }

  /* Separatore sopra badge */
  .rp-sep {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,210,255,0.3), transparent);
    margin-bottom: 20px;
  }

  .rp-icon {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    color: rgba(0,210,255,0.60);
    text-shadow: 0 0 24px rgba(0,210,255,0.45);
    line-height: 1;
  }
  .rp-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.32em;
    color: rgba(0,210,255,0.38);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .rp-year {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 68px;
    color: rgba(0,210,255,0.22);
    letter-spacing: 0.06em;
    line-height: 1;
    text-shadow: 0 0 60px rgba(0,210,255,0.20);
  }

  /* HUD corners */
  .corner { position: absolute; width: 16px; height: 16px; z-index: 5; }
  .corner-tl { top: 12px; left: 12px; border-top: 1px solid rgba(0,210,255,0.35); border-left: 1px solid rgba(0,210,255,0.35); }
  .corner-tr { top: 12px; right: 12px; border-top: 1px solid rgba(0,210,255,0.35); border-right: 1px solid rgba(0,210,255,0.35); }
  .corner-bl { bottom: 12px; left: 12px; border-bottom: 1px solid rgba(0,210,255,0.35); border-left: 1px solid rgba(0,210,255,0.35); }
  .corner-br { bottom: 12px; right: 12px; border-bottom: 1px solid rgba(0,210,255,0.35); border-right: 1px solid rgba(0,210,255,0.35); }
</style>
</head>
<body>

<!--
  ISTRUZIONI PER LO SCREENSHOT:
  1. Apri liberiamo2076.com/og-preview.html
  2. DevTools → Analisi pagina → seleziona <div class="card">
  3. Tasto dx → "Salva una schermata del nodo"
  4. Salva come og-image.jpg in /public/ → commit + push
-->

<div class="card">
  <div class="glow-cyan"></div>
  <div class="glow-magenta"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- SINISTRA: invariata -->
  <div class="content">
    <div class="top-tag">// biblioteca_olografica · anno_2076</div>
    <div class="middle">
      <div class="title">
        LIBERIAMO<br/>
        LA <span class="accent">MENTE</span><span class="dot">.</span>
      </div>
      <div class="divider"></div>
      <div class="tagline">In fondo, si scrive per lasciare una traccia.</div>
    </div>
    <div class="bottom">
      <div class="read-or-perish">READ <span class="or">OR</span> PERISH</div>
      <div class="url">liberiamo2076.com</div>
    </div>
  </div>

  <!-- DESTRA: atmosfera pura -->
  <div class="right-panel">
    <img class="rp-hero" src="https://liberiamo2076.com/og-hero.webp" alt=""/>

    <div class="rp-ghost-icon">◈</div>

    <div class="rp-badge">
      <div class="rp-sep"></div>
      <div class="rp-icon">◈</div>
      <div class="rp-label">biblioteca · holo</div>
      <div class="rp-year">2076</div>
    </div>
  </div>

</div>
</body>
</html>
