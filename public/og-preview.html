<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OG Image Preview — 1200×630</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Grotesk:wght@300;400;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  .card {
    width: 1200px;
    height: 630px;
    background: #0a0a0f;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: stretch;
    border: 1px solid rgba(0,210,255,0.15);
  }

  /* Scanlines */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  /* Glow ambients */
  .glow-cyan {
    position: absolute;
    top: -120px;
    left: -80px;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: rgba(0,210,255,0.12);
    filter: blur(100px);
    pointer-events: none;
  }
  .glow-magenta {
    position: absolute;
    bottom: -80px;
    right: -60px;
    width: 500px;
    height: 400px;
    border-radius: 50%;
    background: rgba(224,64,251,0.10);
    filter: blur(100px);
    pointer-events: none;
  }

  /* Left content area */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 52px 56px;
    position: relative;
    z-index: 2;
  }

  .top-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.28em;
    color: rgba(0,210,255,0.65);
    text-transform: uppercase;
  }

  .middle {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 20px 0;
  }

  .title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 300;
    font-size: 96px;
    line-height: 0.88;
    letter-spacing: -0.03em;
    color: #f0ebe0;
  }
  .title .accent {
    color: #e040fb;
    text-shadow: 0 0 40px rgba(224,64,251,0.6);
  }
  .title .dot {
    color: #00d2ff;
    text-shadow: 0 0 20px rgba(0,210,255,0.6);
  }

  .divider {
    width: 340px;
    height: 1px;
    background: linear-gradient(90deg, rgba(0,210,255,0.4), transparent);
    margin: 32px 0;
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 24px;
    color: rgba(240,235,224,0.55);
    line-height: 1.5;
    max-width: 520px;
  }

  .bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .read-or-perish {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(240,235,224,0.22);
  }
  .read-or-perish .or {
    color: rgba(224,64,251,0.45);
  }

  .url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    color: rgba(0,210,255,0.4);
  }

  /* Right panel with hero image */
  .right-panel {
    width: 340px;
    position: relative;
    z-index: 2;
    overflow: hidden;
    flex-shrink: 0;
  }

  .right-panel img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
    opacity: 0.75;
  }

  /* Fade left edge into card background */
  .right-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, #0a0a0f 0%, rgba(10,10,15,0.2) 40%, transparent 100%);
    z-index: 1;
    pointer-events: none;
  }

  /* 2076 overlay badge */
  .badge {
    position: absolute;
    bottom: 32px;
    right: 24px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    z-index: 2;
  }

  .badge-icon {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    color: rgba(0,210,255,0.5);
    line-height: 1;
    text-shadow: 0 0 20px rgba(0,210,255,0.4);
  }

  .badge-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(0,210,255,0.4);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .badge-year {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 32px;
    color: rgba(0,210,255,0.25);
    letter-spacing: 0.05em;
    line-height: 1;
  }

  /* HUD corner decorations */
  .corner {
    position: absolute;
    width: 16px;
    height: 16px;
    z-index: 5;
  }
  .corner-tl { top: 12px; left: 12px; border-top: 1px solid rgba(0,210,255,0.35); border-left: 1px solid rgba(0,210,255,0.35); }
  .corner-tr { top: 12px; right: 12px; border-top: 1px solid rgba(0,210,255,0.35); border-right: 1px solid rgba(0,210,255,0.35); }
  .corner-bl { bottom: 12px; left: 12px; border-bottom: 1px solid rgba(0,210,255,0.35); border-left: 1px solid rgba(0,210,255,0.35); }
  .corner-br { bottom: 12px; right: 12px; border-bottom: 1px solid rgba(0,210,255,0.35); border-right: 1px solid rgba(0,210,255,0.35); }

  .coord {
    position: absolute;
    bottom: 18px;
    right: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: rgba(0,210,255,0.2);
    text-transform: uppercase;
    z-index: 5;
  }
</style>
</head>
<body>

<!--
  ISTRUZIONI PER LO SCREENSHOT:
  1. Apri questo file su liberiamo2076.com/og-preview.html
  2. Apri DevTools → Analisi pagina (Elements)
  3. Seleziona <div class="card"> nel pannello HTML
  4. Click destro → "Salva una schermata del nodo"
  5. Rinomina il file scaricato in og-image.jpg
  6. Mettilo in /public/ del progetto e fai commit + push
-->

<div class="card">
  <div class="glow-cyan"></div>
  <div class="glow-magenta"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="content">
    <div class="top-tag">// biblioteca_olografica · anno_2076</div>

    <div class="middle">
      <div class="title">
        LIBERIAMO<br/>
        LA <span class="accent">MENTE</span><span class="dot">.</span>
      </div>
      <div class="divider"></div>
      <div class="tagline">
        In fondo, si scrive per lasciare una traccia.
      </div>
    </div>

    <div class="bottom">
      <div class="read-or-perish">READ <span class="or">OR</span> PERISH</div>
      <div class="url">liberiamo2076.com</div>
    </div>
  </div>

  <div class="right-panel">
    <img src="/og-hero.webp" alt="Liberiamo la mente — biblioteca olografica"/>
    <div class="badge">
      <div class="badge-icon">◈</div>
      <div class="badge-label">biblioteca · holo</div>
      <div class="badge-year">2076</div>
    </div>
  </div>

  <div class="coord">EST.2076</div>
</div>

</body>
</html>
