<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OG Image Preview — 1200×630</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Grotesk:wght@300;400;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  .card {
    width: 1200px;
    height: 630px;
    background: #0a0a0f;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: stretch;
    border: 1px solid rgba(0,210,255,0.15);
  }

  /* Scanlines */
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  /* Glow ambients */
  .glow-cyan {
    position: absolute;
    top: -120px;
    left: -80px;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: rgba(0,210,255,0.10);
    filter: blur(100px);
    pointer-events: none;
  }
  .glow-magenta {
    position: absolute;
    bottom: -80px;
    left: 200px;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: rgba(224,64,251,0.08);
    filter: blur(100px);
    pointer-events: none;
  }

  /* ─── COLUMN 1+2: text content ─── */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 48px 52px;
    position: relative;
    z-index: 2;
  }

  .top-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.28em;
    color: rgba(0,210,255,0.65);
    text-transform: uppercase;
  }

  .middle {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 16px 0;
  }

  .title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 300;
    font-size: 100px;
    line-height: 0.88;
    letter-spacing: -0.03em;
    color: #f0ebe0;
  }
  .title .accent {
    color: #e040fb;
    text-shadow: 0 0 40px rgba(224,64,251,0.6);
  }
  .title .dot {
    color: #00d2ff;
    text-shadow: 0 0 20px rgba(0,210,255,0.6);
  }

  .divider {
    width: 320px;
    height: 1px;
    background: linear-gradient(90deg, rgba(0,210,255,0.4), transparent);
    margin: 28px 0;
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 26px;
    color: #f0ebe0;
    line-height: 1.4;
    max-width: 480px;
  }

  .bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .read-or-perish {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(240,235,224,0.22);
  }
  .read-or-perish .or {
    color: rgba(224,64,251,0.50);
  }

  .url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    color: rgba(0,210,255,0.45);
  }

  /* ─── COLUMN 3: logo ─── */
  .logo-col {
    width: 280px;
    flex-shrink: 0;
    border-left: 1px solid rgba(0,210,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 40px;
    position: relative;
    z-index: 2;
  }

  .logo-col img {
    width: 100%;
    max-width: 180px;
    height: auto;
    display: block;
    /* invert: dark logo on white JPEG → light logo on black bg → merges with #0a0a0f */
    filter: invert(1) opacity(0.82);
  }

  /* ─── COLUMN 4: year + badge ─── */
  .year-col {
    width: 180px;
    flex-shrink: 0;
    border-left: 1px solid rgba(0,210,255,0.08);
    background: rgba(0,210,255,0.015);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    position: relative;
    z-index: 2;
    padding: 40px 16px;
  }

  .year-number {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 76px;
    color: rgba(0,210,255,0.18);
    letter-spacing: 0.04em;
    line-height: 1;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    text-shadow: 0 0 60px rgba(0,210,255,0.15);
  }

  .year-icon {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    color: rgba(0,210,255,0.45);
    text-shadow: 0 0 20px rgba(0,210,255,0.35);
    line-height: 1;
  }

  .year-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.28em;
    color: rgba(0,210,255,0.35);
    text-transform: uppercase;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    white-space: nowrap;
  }

  /* HUD corner decorations */
  .corner {
    position: absolute;
    width: 16px;
    height: 16px;
    z-index: 5;
  }
  .corner-tl { top: 12px; left: 12px; border-top: 1px solid rgba(0,210,255,0.35); border-left: 1px solid rgba(0,210,255,0.35); }
  .corner-tr { top: 12px; right: 12px; border-top: 1px solid rgba(0,210,255,0.35); border-right: 1px solid rgba(0,210,255,0.35); }
  .corner-bl { bottom: 12px; left: 12px; border-bottom: 1px solid rgba(0,210,255,0.35); border-left: 1px solid rgba(0,210,255,0.35); }
  .corner-br { bottom: 12px; right: 12px; border-bottom: 1px solid rgba(0,210,255,0.35); border-right: 1px solid rgba(0,210,255,0.35); }
</style>
</head>
<body>

<!--
  ISTRUZIONI PER LO SCREENSHOT:
  1. Apri questo file su liberiamo2076.com/og-preview.html
  2. Apri DevTools → Analisi pagina (Elements)
  3. Seleziona <div class="card"> nel pannello HTML
  4. Click destro → "Salva una schermata del nodo"
  5. Rinomina il file scaricato in og-image.jpg
  6. Mettilo in /public/ del progetto e fai commit + push
-->

<div class="card">
  <div class="glow-cyan"></div>
  <div class="glow-magenta"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Col 1+2: testo -->
  <div class="content">
    <div class="top-tag">// biblioteca_olografica · anno_2076</div>

    <div class="middle">
      <div class="title">
        LIBERIAMO<br/>
        LA <span class="accent">MENTE</span><span class="dot">.</span>
      </div>
      <div class="divider"></div>
      <div class="tagline">
        In fondo, si scrive per lasciare una traccia.
      </div>
    </div>

    <div class="bottom">
      <div class="read-or-perish">READ <span class="or">OR</span> PERISH</div>
      <div class="url">liberiamo2076.com</div>
    </div>
  </div>

  <!-- Col 3: logo -->
  <div class="logo-col">
    <img src="/logo-liberiamo.jpg" alt="Liberiamo la mente"/>
  </div>

  <!-- Col 4: anno -->
  <div class="year-col">
    <div class="year-label">biblioteca · holo</div>
    <div class="year-icon">◈</div>
    <div class="year-number">2076</div>
  </div>

</div>

</body>
</html>
